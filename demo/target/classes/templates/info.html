<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Информация о курсе</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <style>
        body {
            background: #f4f6f9;
        }

        .course-card {
            max-width: 700px;
            margin: 50px auto;
            border: none;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .course-header {
            background: linear-gradient(135deg,#4e73df,#224abe);
            color: white;
            border-radius: 20px 20px 0 0;
            padding: 30px;
        }

        .info-item {
            padding: 15px 20px;
            border-bottom: 1px solid #eee;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .info-label {
            font-weight: bold;
            color: #4e73df;
            font-size: 16px;
        }

        .info-value {
            color: #333;
            font-size: 16px;
        }

        .btn-custom {
            border-radius: 12px;
            padding: 10px 20px;
        }
    </style>
</head>

<body>

<div class="card course-card">
    <div class="course-header">
        <h2 th:text="${course.title}"></h2>
        <p class="mb-0">Информация</p>
    </div>

    <div class="card-body p-0">
        <div th:with="infoText=${course.getInfo()}">
            <div th:each="part : ${#strings.arraySplit(infoText, ',')}" class="info-item">
                <div th:with="parts=${#strings.arraySplit(part, ':')}">
                    <span class="info-label" th:text="${parts[0] + ':'}"></span>
                    <span class="info-value" th:text="${parts.length > 1 ? parts[1] : ''}"></span>
                </div>
            </div>
        </div>
        
        <div class="p-4">
            <a href="/" class="btn btn-secondary btn-custom">Назад</a>
        </div>
    </div>
</div>

</body>
</html>
